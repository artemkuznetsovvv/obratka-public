# nginx внутри контейнера web-frontend — отдаёт только статику SPA.
# /api/ проксирует внешний nginx parser-стэка (см. ~/parser-service/nginx/conf.d/obratka.conf).
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Длинный кеш для hashed-ассетов из Vite (assets/index-*.js, index-*.css, …).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html не кешируем — иначе клиент будет тянуть устаревший манифест ассетов.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: любой неизвестный путь отдаёт index.html, дальше React Router решает.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
